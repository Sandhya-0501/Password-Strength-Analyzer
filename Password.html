<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Strength Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        .strength {
            margin-top: 15px;
            font-weight: bold;
        }

        .suggestions {
            margin-top: 10px;
            font-size: 14px;
            color: #cbd5f5;
        }

        .weak { color: red; }
        .medium { color: orange; }
        .strong { color: limegreen; }
    </style>
</head>
<body>

<div class="container">
    <h2>Password Strength Analyzer</h2>
    <input type="password" id="password" placeholder="Enter password" oninput="checkStrength()">
    
    <div id="strengthText" class="strength"></div>
    <div id="suggestions" class="suggestions"></div>
</div>

<script>
function checkStrength() {
    const password = document.getElementById("password").value;
    const strengthText = document.getElementById("strengthText");
    const suggestions = document.getElementById("suggestions");

    let score = 0;
    let tips = [];

    if (password.length >= 8) {
        score++;
    } else {
        tips.push("Use at least 8 characters");
    }

    if (/[A-Z]/.test(password)) {
        score++;
    } else {
        tips.push("Add uppercase letters");
    }

    if (/[a-z]/.test(password)) {
        score++;
    } else {
        tips.push("Add lowercase letters");
    }

    if (/[0-9]/.test(password)) {
        score++;
    } else {
        tips.push("Include numbers");
    }

    if (/[\W]/.test(password)) {
        score++;
    } else {
        tips.push("Use special characters (!@#$...)");
    }

    // Strength result
    if (score <= 2) {
        strengthText.textContent = "Weak Password";
        strengthText.className = "strength weak";
    } else if (score <= 4) {
        strengthText.textContent = "Medium Password";
        strengthText.className = "strength medium";
    } else {
        strengthText.textContent = "Strong Password";
        strengthText.className = "strength strong";
    }

    suggestions.innerHTML = tips.length ? "Suggestions: <br>" + tips.join("<br>") : "Good job! Strong password.";
}
</script>

</body>
</html>
